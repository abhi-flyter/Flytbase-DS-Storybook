name: Token drift

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  figma-token-drift:
    runs-on: ubuntu-latest
    env:
      FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
      FIGMA_FILE_KEY: WRXdNp9M1SEjWPaUhU67pg
      FIGMA_FILE_NAME: F Design System 2.0 Copy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Figma token drift
        if: ${{ env.FIGMA_ACCESS_TOKEN != '' }}
        run: npm run tokens:check

      - name: Skip Figma token drift check
        if: ${{ env.FIGMA_ACCESS_TOKEN == '' }}
        run: echo "FIGMA_ACCESS_TOKEN secret is not configured, skipping token drift check."
